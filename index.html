<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fotosynthesis Clicker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background-color: #f5f5f5; padding: 20px; height: 100vh; }
.sun { position: fixed; top: 12px; left: 12px; width: 110px; height: auto; cursor: pointer; z-index: 1000; transition: transform 0.15s ease, filter 0.15s ease; }
.sun.flash { transform: scale(1.06); filter: brightness(1.5) drop-shadow(0 0 16px #ffd54f); }

.container { display: flex; flex-direction: row; height: 100%; align-items: stretch; justify-content: center; }
.v-separator { width: 2px; background-color: #999; }
.vak { flex: 1; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; }

#autoVak { background-color: #ffe5e5; justify-content: center; align-items: center; position: relative; overflow: hidden; }
#bandenVak { background-color: #e5f0ff; justify-content: flex-start; align-items: center; }
#banden { font-size: 2em; font-weight: bold; margin-top: 10px; }
#bps, #clickValueDisplay { margin-top: 10px; font-weight: bold; font-size: 1.2em; color: #333; }

#upgrades { background-color: #e5ffe5; justify-content: flex-start; align-items: flex-start; display: flex; justify-content: space-between; gap: 20px; padding: 10px; }
.upgrades-bps, .upgrades-click { display: flex; flex-direction: column; gap: 10px; }
.upgrades-click { align-items: flex-end; }
.upgrades-click button, .upgrades-bps button { width: 220px; padding: 10px; font-size: 1em; }

.auto { width: 300px; height: auto; cursor: pointer; transition: transform 0.1s ease; }
.auto:hover { width: 280px; height: auto; cursor: pointer; }
@keyframes klikAnimatie { 0% { transform: scale(1); } 50% { transform: scale(0.9); } 100% { transform: scale(1); } }
.auto.klik-effect { animation: klikAnimatie 0.2s ease; }

.oxygen-particle {
    position: absolute;
    width: 52px;
    height: 52px;
    pointer-events: none;
    user-select: none;
    animation: oxygenFloatUp 1.4s ease-out forwards;
    z-index: 50;
}

@keyframes oxygenFloatUp {
    0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translate(var(--drift-x, 0px), -140px) scale(1.15); opacity: 0; }
}

#resetGame { background-color: #f44336; color: white; border: none; border-radius: 5px; transition: background-color 0.3s ease; }
#resetGame:hover { background-color: #d32f2f; }

button { border-radius: 15px; transition: 0.2s ease; }
button.disabled-upgrade { background-color: #999 !important; opacity: 0.6; cursor: not-allowed !important; }
button.enabled-upgrade { background-color: #4CAF50; opacity: 1; cursor: pointer; }
button.enabled-upgrade:hover { transform: scale(1.05); }

.ad-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5000;
}

.ad-overlay.show { display: flex; }

.ad-box {
    width: min(90vw, 720px);
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
}

.ad-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.ad-video {
    width: 100%;
    max-height: 70vh;
    border-radius: 8px;
    background: #000;
}
</style>
    <link rel="icon" href="https://raw.githubusercontent.com/laurancalliauw-creator/fotosynthese-tycoon-game/refs/heads/main/make%20a%20logo%20for%20photosynthesis%20clicker%20in%20cartoon%20style.ico" type="image/x-icon">
</head>
<body>
<img src="zon.png" id="sun" class="sun" alt="Zon" />
<div class="container">
    <div class="vak" id="autoVak">
        <img src="plant1.png" class="auto" id="auto" />
    </div>
    <div class="v-separator"></div>
    <div class="vak" id="bandenVak">
        <div id="banden">0 energie</div>
        <div id="bps">Totale productie: 0 energie/s</div>
        <div id="clickValueDisplay">Energie per klik: 1</div>
        <button id="resetGame" style="margin-top: 10px; padding: 8px 12px; font-size: 1em; cursor: pointer;">🔁 Reset spel</button>
        <button id="cheat" style="margin-top: 10px; padding: 8px 12px; font-size: 1em; cursor: pointer;">🔑 Cheat invoeren</button>
        <a href="info.html">
            <button style="margin-top: 10px; padding: 8px 12px; font-size: 1em; cursor: pointer;">Ga naar fotosynthese</button>
        </a>
    </div>
    <div class="v-separator"></div>
    <div id="upgrades">
        <div class="upgrades-bps">
            <button id="koopGarage">Koop Zonlicht (+1 energie/s) (50 energie) - Je hebt 0</button>
            <button id="koopFabriek">Koop Bladgroenkorrel (+5 energie/s) (1000 energie) - Je hebt 0</button>
            <button id="koopMega">Koop Water (+20 energie/s) (5000 energie) - Je hebt 0</button>
            <button id="koopMegaPlus">Koop CO² (+50 energie/s) (10000 energie) - Je hebt 0</button>
            <button id="koopUltra">Koop Humus (+100 energie/s) (50000 energie) - Je hebt 0</button>
            <button id="koopmiljonair">Koop Blad (+500 energie/s) (100000 energie) - Je hebt 0</button>
        </div>
        <div class="upgrades-click">
            <button id="koopSponsor">Koop Lamp (+1 per klik) (500 energie) - Je hebt 0</button>
            <button id="koopManager">Koop Sproeier (+5 per klik) (5000 energie) - Je hebt 0</button>
            <button id="koopMarketeer">Koop Glucose (+10 per klik) (50000 energie) - Je hebt 0</button>
        </div>
    </div>
</div>

<div id="adOverlay" class="ad-overlay" aria-hidden="true">
    <div class="ad-box">
        <div class="ad-header">
            <strong>Reclame</strong>
            <button id="closeAd" style="padding: 6px 10px; cursor: pointer;" disabled>Sluiten</button>
        </div>
        <video id="adVideo" class="ad-video" controls autoplay muted>
            <source src="reclame.mp4" type="video/mp4" />
            Je browser ondersteunt geen video.
        </video>
    </div>
</div>

<audio id="backgroundMusic" loop preload="auto">
    <source src="54e14f79-4365-4a9d-a950-28f15b67acd6.mp3" type="audio/mpeg" />
</audio>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const auto = document.getElementById("auto");
    const autoVak = document.getElementById("autoVak");
    const sun = document.getElementById("sun");
    const energieDiv = document.getElementById("banden");
    const bpsDiv = document.getElementById("bps");
    const clickValueDisplay = document.getElementById("clickValueDisplay");
    const resetButton = document.getElementById("resetGame");
    const adOverlay = document.getElementById("adOverlay");
    const closeAdButton = document.getElementById("closeAd");
    const adVideo = document.getElementById("adVideo");
    const backgroundMusic = document.getElementById("backgroundMusic");
    let adCloseTimeout = null;
    let canCloseAd = false;

    const btnZonlicht = document.getElementById("koopGarage");
    const btnCO2 = document.getElementById("koopFabriek");
    const btnWater = document.getElementById("koopMega");
    const btnBladgroen = document.getElementById("koopMegaPlus");
    const btnBoom = document.getElementById("koopUltra");
    const btnRegenwoud = document.getElementById("koopmiljonair");

    const btnMeststof = document.getElementById("koopSponsor");
    const btnBijen = document.getElementById("koopManager");
    const btnGenetica = document.getElementById("koopMarketeer");

    let energie = 0;
    let totaleEnergie = 0; // Houdt alles bij wat ooit geproduceerd is
    const baseClickValue = 1;

    const defaultPrices = {
        zonlicht: 50,
        co2: 1000,
        water: 5000,
        bladgroen: 10000,
        groteBoom: 50000,
        regenwoud: 100000,
        meststof: 500,
        bijen: 5000,
        genetica: 50000
    };

    const upgrades = {
        zonlicht: { count: 0, price: defaultPrices.zonlicht, power: 1, button: btnZonlicht, type: "bps" },
        co2: { count: 0, price: defaultPrices.co2, power: 5, button: btnCO2, type: "bps" },
        water: { count: 0, price: defaultPrices.water, power: 20, button: btnWater, type: "bps" },
        bladgroen: { count: 0, price: defaultPrices.bladgroen, power: 50, button: btnBladgroen, type: "bps" },
        groteBoom: { count: 0, price: defaultPrices.groteBoom, power: 100, button: btnBoom, type: "bps" },
        regenwoud: { count: 0, price: defaultPrices.regenwoud, power: 500, button: btnRegenwoud, type: "bps" },
        meststof: { count: 0, price: defaultPrices.meststof, power: 1, button: btnMeststof, type: "click" },
        bijen: { count: 0, price: defaultPrices.bijen, power: 5, button: btnBijen, type: "click" },
        genetica: { count: 0, price: defaultPrices.genetica, power: 10, button: btnGenetica, type: "click" }
    };

    function startBackgroundMusic() {
        backgroundMusic.volume = 0.35;
        backgroundMusic.play().catch(() => {});
    }

    startBackgroundMusic();
    document.addEventListener("click", startBackgroundMusic, { once: true });
    document.addEventListener("keydown", startBackgroundMusic, { once: true });
    document.addEventListener("touchstart", startBackgroundMusic, { once: true });

    function calculateBps() {
        let total = 0;
        for (const key in upgrades) {
            if (upgrades[key].type === "bps") {
                total += upgrades[key].count * upgrades[key].power;
            }
        }
        return total;
    }

    function calculateClickValue() {
        let extraClicks = 0;
        for (const key in upgrades) {
            if (upgrades[key].type === "click") {
                extraClicks += upgrades[key].count * upgrades[key].power;
            }
        }
        return baseClickValue + extraClicks;
    }

    function updateEnergieDisplay() {
        energieDiv.textContent = `${energie} energie`;

        // Plant afbeelding veranderen op basis van totaleEnergie
        if (totaleEnergie < 500) {
            auto.src = "plant1.png";
        } else if (totaleEnergie < 3000) {
            auto.src = "plant2.png";
        } else if (totaleEnergie < 10000) {
            auto.src = "plant3.png";
        } else {
            auto.src = "plant4.png";
        }
    }

    function updateUpgradeButtons() {
        for (const key in upgrades) {
            const up = upgrades[key];
            const genoeg = energie >= up.price;

            up.button.disabled = !genoeg;

            if (genoeg) {
                up.button.classList.add("enabled-upgrade");
                up.button.classList.remove("disabled-upgrade");
            } else {
                up.button.classList.add("disabled-upgrade");
                up.button.classList.remove("enabled-upgrade");
            }

            let desc = "";
            if (up.type === "bps") {
                desc = `Koop ${capitalize(key)} (+${up.power} energie/s) (${up.price} energie) - Je hebt ${up.count}`;
            } else {
                desc = `Koop ${capitalize(key)} (+${up.power} per klik) (${up.price} energie) - Je hebt ${up.count}`;
            }

            up.button.textContent = desc;
        }
    }

    function updateBpsDisplay(bps) {
        bpsDiv.textContent = `Totale productie: ${bps} energie/s`;
    }

    function updateClickValueDisplay(clickValue) {
        clickValueDisplay.textContent = `Energie per klik: ${clickValue}`;
    }

    function koopUpgrade(type) {
        const up = upgrades[type];
        if (energie >= up.price) {
            energie -= up.price;
            up.count++;
            up.price = Math.floor(up.price * 1.2);

            updateEnergieDisplay();
            updateUpgradeButtons();
            updateBpsDisplay(calculateBps());
            updateClickValueDisplay(calculateClickValue());
            saveGame();
        }
    }

    auto.addEventListener("click", function () {
        triggerSunFlash();
        spawnOxygenBurst(3);
        const clickValue = calculateClickValue();
        energie += clickValue;
        totaleEnergie += clickValue;

        updateEnergieDisplay();
        updateUpgradeButtons();
        updateBpsDisplay(calculateBps());
        updateClickValueDisplay(clickValue);
        saveGame();
    });

    let hasSunLightImage = false;
    const sunLightProbe = new Image();
    sunLightProbe.onload = () => {
        hasSunLightImage = true;
    };
    sunLightProbe.src = "zon-licht.png";

    function triggerSunFlash() {
        if (hasSunLightImage) {
            sun.src = "zon-licht.png";
        }
        sun.classList.add("flash");
        clearTimeout(sun.lightTimeout);
        sun.lightTimeout = setTimeout(() => {
            sun.classList.remove("flash");
            sun.src = "zon.png";
        }, 200);
    }

    function spawnOxygenMolecule() {
        const molecule = document.createElement("img");
        molecule.src = "Kawaii zuurstofmoleculen met glimlach.png";
        molecule.alt = "Zuurstof";
        molecule.className = "oxygen-particle";

        const baseLeft = auto.offsetLeft + (auto.offsetWidth / 2) - 26;
        const baseTop = auto.offsetTop + (auto.offsetHeight * 0.2);
        const randomX = Math.floor((Math.random() - 0.5) * 90);
        const randomDrift = Math.floor((Math.random() - 0.5) * 80);

        molecule.style.left = `${baseLeft + randomX}px`;
        molecule.style.top = `${baseTop}px`;
        molecule.style.setProperty("--drift-x", `${randomDrift}px`);

        autoVak.appendChild(molecule);
        setTimeout(() => molecule.remove(), 1500);
    }

    function spawnOxygenBurst(count) {
        for (let i = 0; i < count; i++) {
            setTimeout(spawnOxygenMolecule, i * 90);
        }
    }

    btnZonlicht.addEventListener("click", () => koopUpgrade("zonlicht"));
    btnCO2.addEventListener("click", () => koopUpgrade("co2"));
    btnWater.addEventListener("click", () => koopUpgrade("water"));
    btnBladgroen.addEventListener("click", () => koopUpgrade("bladgroen"));
    btnBoom.addEventListener("click", () => koopUpgrade("groteBoom"));
    btnRegenwoud.addEventListener("click", () => koopUpgrade("regenwoud"));
    btnMeststof.addEventListener("click", () => koopUpgrade("meststof"));
    btnBijen.addEventListener("click", () => koopUpgrade("bijen"));
    btnGenetica.addEventListener("click", () => koopUpgrade("genetica"));

    function openAdVideo() {
        if (adCloseTimeout) {
            clearTimeout(adCloseTimeout);
            adCloseTimeout = null;
        }
        canCloseAd = false;
        closeAdButton.disabled = true;
        adOverlay.classList.add("show");
        adOverlay.setAttribute("aria-hidden", "false");
        adVideo.currentTime = 0;
        adVideo.play().catch(() => {});
    }

    function closeAdVideo() {
        if (!canCloseAd) {
            return;
        }
        if (adCloseTimeout) {
            clearTimeout(adCloseTimeout);
            adCloseTimeout = null;
        }
        adOverlay.classList.remove("show");
        adOverlay.setAttribute("aria-hidden", "true");
        adVideo.pause();
    }

    adVideo.addEventListener("ended", () => {
        adVideo.currentTime = 0;
        adVideo.play().catch(() => {});
        adCloseTimeout = setTimeout(() => {
            canCloseAd = true;
            closeAdButton.disabled = false;
        }, 5000);
    });

    closeAdButton.addEventListener("click", closeAdVideo);
    adOverlay.addEventListener("click", (event) => {
        if (event.target === adOverlay) {
            closeAdVideo();
        }
    });

    setInterval(openAdVideo, 30000);

    setInterval(() => {
        const bps = calculateBps();
        if (bps > 0) {
            energie += bps;
            totaleEnergie += bps;

            updateEnergieDisplay();
            updateUpgradeButtons();
            updateBpsDisplay(bps);
            updateClickValueDisplay(calculateClickValue());
            saveGame();
        }
    }, 1000);

    function saveGame() {
        const saveData = {
            energie,
            totaleEnergie, // opslaan
            upgrades: {}
        };
        for (const key in upgrades) {
            saveData.upgrades[key] = {
                count: upgrades[key].count,
                price: upgrades[key].price
            };
        }
        localStorage.setItem("autosave", JSON.stringify(saveData));
    }

    function loadGame() {
        const saveData = localStorage.getItem("autosave");
        if (saveData) {
            try {
                const data = JSON.parse(saveData);
                energie = data.energie || 0;
                totaleEnergie = data.totaleEnergie || 0; // laden
                for (const key in upgrades) {
                    if (data.upgrades[key]) {
                        upgrades[key].count = data.upgrades[key].count || 0;
                        upgrades[key].price = data.upgrades[key].price || defaultPrices[key];
                    }
                }
            } catch {
                console.warn("Ongeldige save data");
            }
        }
    }

    resetButton.addEventListener("click", () => {
        if (confirm("Weet je zeker dat je het spel wilt resetten? Alles gaat verloren.")) {
            localStorage.removeItem("autosave");
            energie = 0;
            totaleEnergie = 0;
            for (const key in upgrades) {
                upgrades[key].count = 0;
                upgrades[key].price = defaultPrices[key];
            }
            location.reload();
        }
    });

    document.getElementById("cheat").addEventListener("click", () => {
        const password = prompt("Voer het wachtwoord in:");
        if (password === "Fotosynthese laat bladeren zonlicht omzetten in leven en lucht.") {
            energie += 100000;
            totaleEnergie += 100000;
            updateEnergieDisplay();
            updateUpgradeButtons();
            updateBpsDisplay(calculateBps());
            updateClickValueDisplay(calculateClickValue());
            saveGame();
            alert("Succes! Je hebt 100000 energie gekregen.");
        } else {
            alert("Fout wachtwoord!");
        }
    });

    function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    loadGame();
    updateEnergieDisplay();
    updateUpgradeButtons();
    updateBpsDisplay(calculateBps());
    updateClickValueDisplay(calculateClickValue());
});
</script>
</body>
</html>
