
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Fotosynthesis Clicker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>
<div class="container">
    <div class="vak" id="autoVak">
        <img src="img/auto.webp" class="auto" id="auto" />
    </div>

    <div class="v-separator"></div>

    <div class="vak" id="bandenVak">
        <div id="banden">0 energie</div>
        <div id="bps">Totale productie: 0 energie/s</div>
        <div id="clickValueDisplay">Energie per klik: 1</div>
        <button id="resetGame" style="margin-top: 10px; padding: 8px 12px; font-size: 1em; cursor: pointer;">
            🔁 Reset spel
        </button>
    </div>

    <div class="v-separator"></div>

    <div id="upgrades">
        <div class="upgrades-bps">
            <button id="koopGarage">Koop Zonlicht (+1 energie/s) (50 energie) - Je hebt 0</button>
            <button id="koopFabriek">Koop Bladgroenkorrel (+5 energie/s) (1000 energie) - Je hebt 0</button>
            <button id="koopMega">Koop Water (+20 energie/s) (5000 energie) - Je hebt 0</button>
            <button id="koopMegaPlus">Koop CO² (+50 energie/s) (10000 energie) - Je hebt 0</button>
            <button id="koopUltra">Koop Humus (+100 energie/s) (50000 energie) - Je hebt 0</button>
            <button id="koopmiljonair">Koop Blad (+500 energie/s) (100000 energie) - Je hebt 0</button>
        </div>
        <div class="upgrades-click">
            <button id="koopSponsor">Koop Lamp (+1 per klik) (500 energie) - Je hebt 0</button>
            <button id="koopManager">Koop Sproeier (+5 per klik) (5000 energie) - Je hebt 0</button>
            <button id="koopMarketeer">Koop Glucose (+10 per klik) (50000 energie) - Je hebt 0</button>
        </div>
    </div>
</div>
</body>
</html>
